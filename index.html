  ║   Он превращает обычный список файлов GitHub в интерактивный веб-сайт с папками,         ║

  ║   Вся структура сайта управляется через HTML-список.                                     ║
  ║   Скрипт считывает этот список и рисует интерфейс.                                       ║
  ║                                                                                          ║
  ║   3. СТРУКТУРА ФАЙЛОВ НА GITHUB (КРИТИЧЕСКИ ВАЖНО!)                                      ║
  ║   Структура внутри этого файла должна ЗЕРКАЛЬНО отражать реальное расположение файлов.   ║

  ║   [Пример вашей текущей структуры]:                                                      ║
  ║   Ваш_Репозиторий/                                                                       ║
  ║   ├── index.html            (Этот файл)                                                  ║
  ║   ├── anotherfile.html      (Файл лежит в корне, рядом с index.html)                     ║
  ║   └── GEMINI-PERPLEXITY/    (Папка с файлами)                                            ║
  ║       ├── Setup-Gemini-CLI.html                                                          ║
  ║       └── ...                                                                            ║
  ║                                                                                          ║
  ║   4. КАК РЕДАКТИРОВАТЬ СОДЕРЖИМОЕ (В КОДЕ)                                               ║
  ║   Для редактирования списка файлов перейдите к:                                          ║
  ║   👉 [ SECTION 3: DATA SOURCE ] (Секция данных)                                          ║

  ║       <div data-folder="ИМЯ_ПАПКИ_НА_GITHUB">                                            ║
  ║           ...файлы...                                                                    ║
  ║       </div>                                                                             ║
  ║       * Важно: Имя в data-folder должно точно совпадать с именем папки на диске.         ║

  ║   [Б] ДОБАВИТЬ ФАЙЛ:                                                                     ║
  ║       <div data-file="real-name.html">Отображаемое Имя</div>                             ║
  ║       * data-file: реальное имя файла (для ссылки).                                      ║

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body {

        }
        
        /* --- Dark Mode Base --- */
        .dark body {
            background-color: #111827;
            color: #d1d5db;
        }
        .dark .card {
            background-color: #1f2937;
            border: 1px solid #374151;
            box-shadow: 0 0 15px 3px rgba(139, 108, 235, 0.4);
        }
        .dark .glowing-text {

        .folder-grid {

            gap: 1.5rem;
        }

        @media (min-width: 640px) { /* sm */

        @media (min-width: 768px) { /* md */

                grid-template-columns: repeat(3, 1fr); /* 3 колонки */

        }

        @media (min-width: 1024px) { /* lg */

        .folder-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;

            border-radius: 0.75rem;

            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #A78BFA;
        }

        .dark .folder-card {
            background-color: #374151;

            background-color: #4b5563;
            border-color: #A78BFA;
            box-shadow: 0 0 15px 3px rgba(167, 139, 250, 0.3);

        .folder-card-icon {
            font-size: 2.5rem; /* 40px */
            line-height: 1;
            margin-bottom: 0.75rem; 
            color: #5B21B6;
            position: relative; /* Для позиционирования замка */
            display: inline-block;

        /* --- Стили для папки с замком --- */
        .locked-folder-icon::after {
            content: '🔒'; /* Символ замка */
            position: absolute;
            top: 55%; /* Позиционирование по вертикали */
            left: 50%; /* Позиционирование по горизонтали */
            transform: translate(-50%, -50%); /* Коррекция для идеального центра */
            font-size: 0.45em; /* Маленький размер */
            line-height: 1;
        }

        .dark .folder-card-icon {
            color: #A78BFA;
        }

        .folder-card-name {
            font-size: 1rem; /* 16px */
            font-weight: 600;
            word-break: break-all; 
        }

        /* --- СТИЛИ: Модальное окно --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background-color: #fff;
            border-radius: 0.75rem;
            padding: 2rem;
            width: 100%;
            max-width: 42rem; /* 672px */
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.open .modal-content {
             transform: scale(1);
        }

        .dark .modal-content {
            background-color: #1f2937;
            border: 1px solid #374151;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .dark .modal-header {
             border-color: #374151;
        }
        
        .modal-title {
            font-size: 1.5rem; /* 24px */
            font-weight: 600;
            color: #5B21B6;
        }

        .modal-close-btn {

            border: none;
            cursor: pointer;

        }

            color: #374151;
        }
        .dark .modal-close-btn:hover {
            color: #e5e7eb;
        }
        
        .modal-file-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .modal-file-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .modal-file-item:hover {
            background-color: #f9fafb;
        }
        
        .dark .modal-file-item:hover {
            background-color: #374151;
        }

        .modal-file-item a {
            flex: 1;
            overflow: hidden;

        .dark .modal-file-item a {

        .modal-file-item-icon {
            font-size: 1.25rem;
            color: #9ca3af;
        }
        
        .dark .modal-file-item-icon {
             color: #6b7280;
        }
        
    </style>
</head>

    <!-- 
      =============================================================================
      [ SECTION 4: JS LOGIC ]
      Основная логика приложения:
      1. Парсинг данных из HTML.
      2. Генерация интерактивных карточек.
      3. Универсальное формирование путей URL.
      4. Управление темой (Dark/Light).
      =============================================================================
    -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rootHtml = document.documentElement;
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            
            // --- Ссылки на DOM ---
            const gridContainer = document.getElementById('folderGridContainer');
            const folderDataContainer = document.getElementById('folderData');
            const themeToggleButton = document.getElementById('themeToggleButton');
            
            // --- Ссылки на Модальное окно ---
            const modal = document.getElementById('fileModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalFileList = document.getElementById('modalFileList');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            // --- ФУНКЦИЯ РЕНДЕРИНГА (КАРТОЧКИ) ---
            const renderFolderCards = (folders) => {
                gridContainer.innerHTML = '';
                
                folders.forEach((folder) => {
                    const card = document.createElement('button');
                    card.classList.add('folder-card');
                    card.setAttribute('type', 'button');
                    
                    const iconSpan = document.createElement('span');
                    iconSpan.classList.add('folder-card-icon');

                    // --- ГИБКАЯ ПРОВЕРКА НА ЗАМОК ---
                    if (folder.isLocked) {
                        iconSpan.classList.add('locked-folder-icon');
                    }
                    iconSpan.textContent = '📁'; // Всегда папка
                    
                    card.appendChild(iconSpan);
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.classList.add('folder-card-name');
                    nameSpan.textContent = `[${folder.name}]`;
                    card.appendChild(nameSpan);

                    // Привязываем событие для открытия модального окна
                    card.addEventListener('click', () => {
                        openModal(folder);
                    });
                    
                    gridContainer.appendChild(card);
                });
            };

            // --- ФУНКЦИЯ ОТКРЫТИЯ МОДАЛЬНОГО ОКНА ---
            const openModal = (folder) => {
                // 1. Установить заголовок
                modalTitle.textContent = `[${folder.name}]`;
                
                // 2. Очистить и заполнить список файлов
                modalFileList.innerHTML = ''; 
                
                if (folder.files.length === 0) {
                    modalFileList.innerHTML = '<p class="text-gray-500"><em>В этой папке нет файлов.</em></p>';
                }
                
                // --- ЛОГИКА УНИВЕРСАЛЬНЫХ ПУТЕЙ ---
                // Определяем, является ли папка корневой.
                // Если имя содержит .github.io или явно равно "root"
                const isRoot = folder.name.includes('.github.io') || folder.name === 'root';

                folder.files.forEach(file => {
                    // Генерируем относительный путь
                    const baseUrl = isRoot 
                        ? `${file.href}`                 // Если корень: просто имя файла
                        : `${folder.name}/${file.href}`; // Если папка: папка/имя файла
                    
                    // --- ОБРАБОТКА ИКОНКИ КЛЮЧА ---
                    let fileIcon = '📄';
                    let displayName = file.name;

                    if (file.name.startsWith('🔑')) {
                        fileIcon = '🔑';
                        displayName = Array.from(file.name).slice(1).join('').trim();
                    }
                    
                    const fileEl = document.createElement('div');
                    fileEl.classList.add('modal-file-item');
                    fileEl.innerHTML = `
                        <span class="modal-file-item-icon">${fileIcon}</span>
                        <a href="${baseUrl}" title="${file.name}">${displayName}</a>
                    `;
                    modalFileList.appendChild(fileEl);
                });
                
                // 3. Показать модальное окно
                modal.classList.remove('hidden');
                modal.classList.add('open');
            };
            
            // --- ФУНКЦИЯ ЗАКРЫТИЯ МОДАЛЬНОГО ОКНА ---
            const closeModal = () => {
                modal.classList.remove('open');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modalTitle.textContent = '';
                    modalFileList.innerHTML = '';
                }, 300);
            };

            // --- ПАРСЕР ДАННЫХ ---
            const getFolderData = () => {
                const folders = [];
                Array.from(folderDataContainer.children).forEach(folderEl => {
                    if (folderEl.tagName !== 'DIV' || !folderEl.dataset.folder) return; 
                    
                    const folderName = folderEl.dataset.folder;
                    const files = [];
                    let hasLockedFile = false; 

                    Array.from(folderEl.children).forEach(fileEl => {
                        if (fileEl.tagName !== 'DIV' || !fileEl.dataset.file) return; 
                        
                        const fileName = fileEl.textContent;
                        
                        if (fileName.startsWith('🔑')) {
                            hasLockedFile = true;
                        }

                        files.push({
                            name: fileName,
                            href: fileEl.dataset.file
                        });
                    });
                    
                    files.sort((a, b) => a.name.localeCompare(b.name));
                    
                    folders.push({ 
                        name: folderName, 
                        files: files, 
                        isLocked: hasLockedFile 
                    });
                });
                
                folders.sort((a, b) => a.name.localeCompare(b.name));
                return folders;
            };

            const folders = getFolderData();
            renderFolderCards(folders);
            
            // --- События закрытия ---
            modalCloseBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            // --- Theme Toggle Logic ---
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark' || (!currentTheme && prefersDark.matches)) {
                rootHtml.classList.add('dark');
                themeToggleButton.textContent = 'Светлая тема';
            } else {
                themeToggleButton.textContent = 'Тёмная тема';
            }
            
            prefersDark.addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    if (e.matches) {
                        rootHtml.classList.add('dark');
                    } else {
                        rootHtml.classList.remove('dark');
                    }
                    themeToggleButton.textContent = rootHtml.classList.contains('dark') ? 'Светлая тема' : 'Тёмная тема';
                }
            });
            
            themeToggleButton.addEventListener('click', () => {
                rootHtml.classList.toggle('dark');
                if (rootHtml.classList.contains('dark')) {
                    localStorage.setItem('theme', 'dark');
                    themeToggleButton.textContent = 'Светлая тема';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeToggleButton.textContent = 'Тёмная тема';
                }
            });
        });
    </script>
</body>
</html>
